name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint + Typecheck + Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Dummy values so Prisma generate and Next.js build don't fail.
      # Real secrets only matter at runtime.
      DATABASE_URL: postgresql://ci:ci@localhost:5432/edupro?schema=public
      AUTH_SECRET: ci-secret-not-used-in-runtime-ci-builds-only
      AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_APP_NAME: EduPro
      NEXT_PUBLIC_APP_DOMAIN: localhost:3000

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build
